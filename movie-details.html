                </div> 
            </a>

        <ul class="navlinks">
            <li><a href="index.html">Home</a></li>
            <li><a href="movies.html">Movies</a></li>
            <li><a href="tvSeries.html">TV Show</a></li>
            <li><a href="#">Top Rated</a></li>
        </ul>

         <div class="leftnav">


            <div class="lastNav">
                <div class="serach" id="searchBtn" style="cursor: pointer;">
                    <svg style="color: white;" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" class="lucide lucide-search-icon lucide-search">
                        <path d="m21 21-4.34-4.34" />
                        <circle cx="11" cy="11" r="8" />
                    </svg>
                </div>
                <div class="liked">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        class="lucide lucide-heart-icon lucide-heart">
                        <path
                            d="M2 9.5a5.5 5.5 0 0 1 9.591-3.676.56.56 0 0 0 .818 0A5.49 5.49 0 0 1 22 9.5c0 2.29-1.5 4-3 5.5l-5.492 5.313a2 2 0 0 1-3 .019L5 15c-1.5-1.5-3-3.2-3-5.5" />
                    </svg>
                    <p>My List</p>

            </div>

            <button class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </button>

        </div>

    </header>

    <nav class="mobile-nav" id="mobileNav">
        <a href="index.html">Home</a>
        <a href="movies.html">Movies</a>
        <a href="tvSeries.html">TV Show</a>

        <a href="#">❤️ My List</a>

    <div class="main">
        <div class="center-conatiner">

        </div>

    </div>
    <section class="caste-crue">
        <h1 class="title" style="margin: 20px 0px 20px 50px">Cast</h1>
        <div class="cast-cards">

        </div>
    </section>

    <section class="teaserContainer">
        <h1 class="title" style="margin-bottom: 20px">Teasers</h1>
        <div class="teaser-card">

        </div>
    </section>

    <section class="screenShots">
        <h1 class="title" style="margin-bottom: 20px">Images</h1>
          <div class="imagescards">
               
          </div>
    </section>

    <!--  review section -->
      <section class="review-container">
         <h1 class="title" style="margin-bottom: 20px">Reviews</h1>
        <div class="reviewcards">
        </div>
      </section>


    <script>
         let movie = []
        let credits = []
        let teaser = []
        let posters = []
        let reviews = []
        const apiKey = "c2b2450a7d2e59a0d4e951029f99dd83";

        const params = new URLSearchParams(window.location.search);
        const movieId = params.get("id");


        async function moviDetail() {

            try {
                const response = await fetch(`https://api.themoviedb.org/3/movie/${movieId}?api_key=${apiKey}`);
                const data = await response.json();
                movie = data

                const casteresponse = await fetch(`https://api.themoviedb.org/3/movie/${movieId}/credits?api_key=${apiKey}`);
                const castedata = await casteresponse.json();
                credits = castedata.cast.slice(0, 10)

                const posterResponse = await fetch(`https://api.themoviedb.org/3/movie/${movieId}/images?api_key=${apiKey}`);
                const posterData = await posterResponse.json();
                posters = posterData.backdrops.slice(0,9);
                
                renderUi()

            }
            catch (error) {
                console.log(error);

            }
        }
        moviDetail();


        async function getTeaser() {
            try{
                const teaserResponse = await fetch(`https://api.themoviedb.org/3/movie/${movieId}/videos?api_key=${apiKey}`);
                const videodata = await teaserResponse.json();
                teaser = videodata.results.slice(0,1)
                
                renderUi()
            }
            catch(error){
                console.log(error);
                
            }
        }
        getTeaser()

        function renderUi() {
            console.log(teaser[0].key);
            
            const mainContainer = document.querySelector('.main');

            const centerConatiner = document.querySelector('.center-conatiner');
            centerConatiner.classList.add('center-conatiner');

            centerConatiner.innerHTML = `
                <div class="left">
                <img src="https://image.tmdb.org/t/p/w500/${movie.poster_path}" alt="movieposter">
            </div>
            <div class="right">
                <h1 class="movie_title">${movie.title}</h1>
                <div class="rating">
                    <svg xmlns="http://w3.org" viewBox="0 0 24 24" width="20" height="20">
                        <path
                            d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"
                            fill="#FFD700" />
                    </svg>

                    <span id="rate">${movie.vote_average}</span>
                    <span>|</span>
                    <span id="rate">${movie.release_date}</span>
                    <span>|</span>
                    <span id="genrse">${movie.genres[0].name}</span>
                    <span>|</span>
                    <span id="hours">${movie.runtime} M</span>
                </div>
                <div class="buget">
                    <p>
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                            class="lucide lucide-circle-dollar-sign-icon lucide-circle-dollar-sign">
                            <circle cx="12" cy="12" r="10" />
                            <path d="M16 8h-6a2 2 0 1 0 0 4h4a2 2 0 1 1 0 4H8" />
                            <path d="M12 18V6" />
                        </svg>
                        Buget : ${movie.budget}
                    </p>
                    <p>|</p>
                    <p>
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                            class="lucide lucide-circle-dollar-sign-icon lucide-circle-dollar-sign">
                            <circle cx="12" cy="12" r="10" />
                            <path d="M16 8h-6a2 2 0 1 0 0 4h4a2 2 0 1 1 0 4H8" />
                            <path d="M12 18V6" />
                        </svg>
                        Revenue : ${movie.revenue}
                    </p>
                </div>
                <p id="tagline">${movie.tagline}</p>
                <p id="overview">${movie.overview}</p>

                <div class="movibuttons">
           <button id="playbtn"> <a href="https://www.youtube.com/watch?v=${teaser[0].key}" target="_blank">
                    
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round"
                            class="lucide lucide-circle-play-icon lucide-circle-play">
                            <path
                                d="M9 9.003a1 1 0 0 1 1.517-.859l4.997 2.997a1 1 0 0 1 0 1.718l-4.997 2.997A1 1 0 0 1 9 14.996z" />
                            <circle cx="12" cy="12" r="10" />
                        </svg>
                        Play Trailer
                        </a>
                    </button>
                    <button id="mylistbtn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                            class="lucide lucide-heart-icon lucide-heart">
                            <path
                                d="M2 9.5a5.5 5.5 0 0 1 9.591-3.676.56.56 0 0 0 .818 0A5.49 5.49 0 0 1 22 9.5c0 2.29-1.5 4-3 5.5l-5.492 5.313a2 2 0 0 1-3 .019L5 15c-1.5-1.5-3-3.2-3-5.5" />
                        </svg>
                    </button>
                </div>

            </div>


            `;
            mainContainer.appendChild(centerConatiner);


            //  caste

            const castCards = document.querySelector('.cast-cards')


            credits.forEach(cast => {
                const castcard = document.createElement('div');
                castcard.classList.add('cast-card')

                castcard.innerHTML = `
    
                <div class="castImg">
                    <img src="https://image.tmdb.org/t/p/w500/${cast.profile_path}" alt="casteimage">
                </div>
                <div class="casteName">

                    <p>${cast.name}</p>
                    <p id="charName">${cast.character}</p>
                </div>

    `
                castCards.appendChild(castcard)
            })


            // video 

            const teaserCard = document.querySelector('.teaser-card');
            teaser.forEach(video =>{
                const teasers = document.createElement('div');
                teasers.classList.add('teasers')

                teasers.innerHTML= `
                
                 <iframe width="420" height="280" src="https://www.youtube.com/embed/${video.key}">
                </iframe

                `

                teaserCard.appendChild(teasers)
            })


            //  ScreenShots section 
            const imagesCards = document.querySelector('.imagescards');
            posters.forEach(poster =>{

                const posterCard = document.createElement('div');
                posterCard.classList.add('posterCard');

                posterCard.innerHTML = `
                
            <div class="images">
                        <img src="https://image.tmdb.org/t/p/w500//${poster.file_path}" alt="images">
            </div>
                
                `

                imagesCards.appendChild(posterCard)
            })

            
            // review section
            const reviewCards = document.querySelector('.reviewcards');
            reviews.forEach(revie =>{
                const review = document.createElement('div');
                review.classList.add('review');

                review.innerHTML=`
                <div class="reviewtop">
                    <img src="https://plus.unsplash.com/premium_photo-1677252438411-9a930d7a5168?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MXx8cHJvZmlsZSUyMGltYWdlZXxlbnwwfHwwfHx8MA%3D%3D" alt="">
                    <div class="name-rating">
                        <h4>${revie.author}</h4>
                        <ul>
                            <li>⭐ ${revie.author_details.rating || "N/A"}</li>
                            <li>|</li>
                            <li>
                            ${new Date(revie.created_at).toLocaleDateStriwng('en-US', {
                                year: 'numeric',
                                month: 'short',
                                day: 'numeric'
                            })}
                            </li>
                        </ul>
                        <p></p>
                    </div>

                </div>
                <div class="reviewContent">
                    <p>${revie.content}</p>
                </div>
                <p id="showmoreBtn"><a href="${revie.url}">Show more</a></p>
                
                `

                reviewCards.appendChild(review)
            })




            
        }
        async function getReview(){
            try{
            const response = await fetch(`https://api.themoviedb.org/3/movie/${movieId}/reviews?api_key=${apiKey}`);
            const data = await response.json();
            reviews = data.results.slice(0,3)
            
            renderUi()
            
            }
            catch(error){   
                console.log(error);
                
            }
        }


    getReview();
    
    // Hamburger Menu Toggle
    const hamburger = document.getElementById('hamburger');
    const mobileNav = document.getElementById('mobileNav');

    hamburger.addEventListener('click', () => {
        hamburger.classList.toggle('active');
        mobileNav.classList.toggle('active');
    });

    // Close menu when a link is clicked
    const mobileNavLinks = mobileNav.querySelectorAll('a');
    mobileNavLinks.forEach(link => {
        link.addEventListener('click', () => {
            hamburger.classList.remove('active');
            mobileNav.classList.remove('active');
        });
    });

    // Close menu when clicking outside
    document.addEventListener('click', (e) => {
        if (!e.target.closest('.navbar') && !e.target.closest('.mobile-nav')) {
            hamburger.classList.remove('active');
            mobileNav.classList.remove('active');
        }
    });
</script>

</body>

</html>
