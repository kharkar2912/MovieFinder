        /* The design for the dark background popup window */
.modal {
  display: none; /* Hidden by default */
  position: fixed; 
  z-index: 1000; 
  left: 0;
  top: 0;
  width: 100%; /* Full screen width */
  height: 100%; /* Full screen height */
  overflow: auto; /* Enable scroll if the image is too tall */
  background-color: rgba(0, 0, 0, 0.9); /* Black background with transparency */
}

/* The actual big image inside the popup */
.modal-content {
  margin: auto;
  display: block;
  width: 80%;
  max-width: 800px; /* Limits how big the image can get */
  animation-name: zoom; /* Smooth pop-in animation */
  animation-duration: 0.6s;
}

/* Animation to zoom in the image */
@keyframes zoom {
  from {transform: scale(0)} 
  to {transform: scale(1)}
}

/* The close button (X) in the top right */
.close {
  position: absolute;
  top: 15px;
  right: 35px;
  color: #f1f1f1;
  font-size: 40px;
  font-weight: bold;
  cursor: pointer;
}

.close:hover {
  color: #bbb;
}

    </style>

<script>
    // Get the HTML elements
var modal = document.getElementById("myModal");
var img = document.getElementById("myImg");
var modalImg = document.getElementById("imgPopup");

// When the user clicks the small image, open the popup window
img.onclick = function(){
  modal.style.display = "block";
  modalImg.src = this.src; // Uses the same source file for the big version
}

// Get the close button element
var span = document.getElementsByClassName("close")[0];

// When the user clicks on (X), close the popup window
span.onclick = function() { 
  modal.style.display = "none";
}

// Optional: Close the popup if the user clicks anywhere outside the image
modal.onclick = function(event) {
  if (event.target === modal) {
    modal.style.display = "none";
  }
}

</script>
</body>
</html>
