<!DOCTYPE html>

<body>
    <header class="navbar">


        <div class="logo">
            <svg width="220" height="50" viewBox="0 0 220 50" fill="none" xmlns="http://www.w3.org/2000/svg">

                <!-- Icon -->
                <g transform="translate(5,5)">
                    <!-- Film reel top -->
                    <rect x="0" y="0" width="24" height="6" rx="2" fill="#E50914" />
                    <circle cx="12" cy="20" r="14" stroke="#E50914" stroke-width="3" fill="none" />

                    <!-- Play button -->
                    <polygon points="9,13 9,27 21,20" fill="#E50914" />

                    <!-- Handle -->
                    <rect x="20" y="28" width="12" height="4" rx="2" transform="rotate(45 20 28)" fill="#E50914" />
                </g>

                <!-- Text -->
                <text x="50" y="33" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="white">
                    MOVIE
                </text>

                <text x="128" y="33" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#E50914">
                    FINDER
                </text>

            </svg>
        </div>

        <ul class="navlinks">
            <li><a href="index.html">Home</a></li>
            <li><a href="#" style="color: red;">Movies</a></li>
            <li><a href="tvSeries.html">TV Show</a></li>
            <li><a href="#">Top Rated</a></li>
        </ul>

        <div class="lastNav">
            <div class="serach"> 
                <svg style="color: white;" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    class="lucide lucide-search-icon lucide-search">
                    <path d="m21 21-4.34-4.34" />
                    <circle cx="11" cy="11" r="8" />
                </svg>
            </div>
            <div class="liked">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    class="lucide lucide-heart-icon lucide-heart">
                    <path
                        d="M2 9.5a5.5 5.5 0 0 1 9.591-3.676.56.56 0 0 0 .818 0A5.49 5.49 0 0 1 22 9.5c0 2.29-1.5 4-3 5.5l-5.492 5.313a2 2 0 0 1-3 .019L5 15c-1.5-1.5-3-3.2-3-5.5" />
                </svg>
                <p>My List</p>
            </div>

        </div>

    </header>

      <!--  Search part  -->
    <section>
        <div class="searchContainer">

            <form class="serach_form">

                <input type="text" placeholder="Search Show" id="movie_input">
                <select id="yearSearch">
                    <option value="All year">All year</option>
                </select>
                <select id="genre">
                    <option value="">All Genres</option>
                    <option value="28">Action</option>
                    <option value="12">Adventure</option>
                    <option value="16">Animation</option>
                    <option value="35">Comedy</option>
                    <option value="80">Crime</option>
                    <option value="99">Documentary</option>
                    <option value="18">Drama</option>
                    <option value="10751">Family</option>
                    <option value="14">Fantasy</option>
                    <option value="36">History</option>
                    <option value="27">Horror</option>
                    <option value="10402">Music</option>
                    <option value="9648">Mystery</option>
                    <option value="10749">Romance</option>
                    <option value="878">Science Fiction</option>
                    <option value="10770">TV Movie</option>
                    <option value="53">Thriller</option>
                    <option value="10752">War</option>
                    <option value="37">Western</option>
                </select>

                <button id="Searchbtn">Submit</button>
            </form>
        </div>

    </section>



    <section class="popular-movie">

    <button id="next">Next<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-arrow-right-icon lucide-arrow-right"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg></button>
</section>
